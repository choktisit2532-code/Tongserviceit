<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexInvoice Enterprise - Dashboard</title>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; background: #f4f6f9; margin: 0; padding: 24px; }
    .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); max-width: 600px; margin: auto; }
    .btn { background: #0066cc; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
    .live-alert { background: #e1f5fe; color: #0288d1; padding: 10px; border-radius: 4px; display: none; margin-bottom: 15px; }
  </style>
</head>
<body>

  <div class="card">
    <h2>NexInvoice Control Panel Dashboard</h2>
    <div id="liveAlert" class="live-alert"></div>
    <button class="btn" onclick="triggerCreateInvoice()">Simulate Fast Invoice Generation</button>
  </div>

  <script src="./js/dashboard.js"></script>
</body>
</html>
